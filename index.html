<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cold Call Tracker — Team</title>
<style>
  :root{--bg:#020617;--card:#0f172a;--border:#1e293b;--border2:#334155;
    --white:#fff;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;}
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg);color:var(--white);min-height:100vh;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:900px;margin:0 auto;padding:16px;}
  @media(min-width:640px){.wrap{padding:24px;}}
  svg{display:block;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .brand{font-size:22px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;}
  .badge{font-size:11px;font-weight:700;letter-spacing:.08em;background:#3730a3;color:#c7d2fe;padding:3px 8px;border-radius:6px;}
  .mode-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--s400);background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius:999px;}
  .mode-dot{width:8px;height:8px;border-radius:999px;background:#f59e0b;}
  .mode-dot.live{background:#10b981;}
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:16px;}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;border:none;background:none;color:var(--s400);
    font-family:inherit;font-size:14px;font-weight:600;padding:9px;border-radius:10px;cursor:pointer;transition:.15s;}
  .tab:hover{color:var(--s200);}
  .tab.active{background:#1e293b;color:#fff;}
  .seg{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;}
  .seg button{border:none;background:none;color:var(--s400);font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;transition:.15s;}
  .seg button.active{background:#334155;color:#fff;}
  .trackbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
  .who{display:flex;align-items:center;gap:8px;}
  .who label{font-size:12px;color:var(--s500);font-weight:600;}
  .rightctl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select.sel,input.datein{background:var(--card);border:1px solid var(--border2);color:#fff;font-family:inherit;font-size:14px;font-weight:600;
    padding:9px 12px;border-radius:12px;outline:none;cursor:pointer;}
  select.sel{min-width:180px;font-size:15px;}
  input.datein{color-scheme:dark;}
  .rangelabel{color:var(--s400);font-size:13px;font-weight:600;margin:0 2px 14px;}
  .banner{background:#0f172a;border:1px solid #3730a3;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--s300);display:flex;gap:10px;align-items:flex-start;}
  .banner b{color:#c7d2fe;}
  .editbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--card);border:1px solid #334155;border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .editbar .txt{font-size:13px;color:var(--s300);}
  .editbar input{background:var(--bg);border:1px solid var(--border2);color:#fff;font-family:inherit;font-size:15px;padding:8px 12px;border-radius:10px;outline:none;width:110px;letter-spacing:2px;}
  .editbar input:focus{border-color:#6366f1;}
  .editbar.ok{border-color:#065f46;}
  .pwerr{color:#fb7185;font-size:13px;}

  .grid-goals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .grid-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;}
  .grid-chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:22px;}
  .gcard,.tile,.chip-stat{background:var(--card);border:1px solid var(--border);border-radius:16px;}
  .gcard{padding:16px;}
  .gcard-top{display:flex;align-items:center;justify-content:space-between;}
  .gcard-top .lbl{display:flex;align-items:center;gap:8px;color:var(--s300);font-weight:600;}
  .gcard-top .frac{font-size:14px;color:var(--s500);font-variant-numeric:tabular-nums;}
  .gcard-mid{display:flex;align-items:baseline;gap:8px;margin-top:8px;}
  .gcard-mid .big{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;}
  .gcard-mid .pct{font-size:12px;color:var(--s500);}
  .bar{margin-top:8px;height:10px;width:100%;border-radius:9999px;background:#1e293b;overflow:hidden;}
  .bar>div{height:100%;border-radius:9999px;transition:width .2s;}
  .tile{padding:14px 16px;}
  .tile .lbl{color:var(--s500);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .tile .val{margin-top:4px;font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;}
  .chip-stat{padding:12px 16px;}
  .chip-stat .lbl{color:var(--s500);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .chip-stat .val{margin-top:4px;font-size:24px;font-weight:700;}

  .section{display:flex;align-items:center;gap:8px;margin:0 0 8px 4px;}
  .section .stitle{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--s400);}
  .section .line{height:1px;flex:1;background:var(--border);}
  .helper{color:var(--s500);font-size:12px;margin:0 0 12px 4px;}

  .grid4{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:22px;}
  @media(min-width:560px){.grid4{grid-template-columns:1fr 1fr;}}
  @media(min-width:900px){.grid4{grid-template-columns:repeat(var(--cols,4),minmax(0,1fr));}}

  .metric{position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;
    user-select:none;-webkit-user-select:none;transition:border-color .15s,transform .05s;}
  .metric:not(.ro){cursor:pointer;}
  .metric:not(.ro):hover{border-color:var(--accent);}
  .metric:not(.ro):active{transform:scale(.97);}
  .metric.ro{opacity:.96;}
  .metric-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;min-height:36px;}
  .chip{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--chipbg);color:var(--chipfg);}
  .ctrls{display:flex;align-items:center;gap:8px;}
  .minus{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9999px;background:#1e293b;color:var(--s300);border:none;cursor:pointer;transition:background .15s;}
  .minus:hover{background:#334155;}
  .dot{width:34px;height:34px;border-radius:9999px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;font-weight:700;line-height:1;}
  .num{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;}
  .pctbadge{font-size:15px;font-weight:600;color:var(--s400);margin-left:8px;}
  .mlabel{margin-top:4px;font-weight:600;color:var(--s200);}
  .msub{font-size:12px;color:var(--s500);}

  table.lead{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  table.lead th,table.lead td{padding:11px 12px;text-align:right;font-size:14px;font-variant-numeric:tabular-nums;}
  table.lead th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--s500);font-weight:700;border-bottom:1px solid var(--border);background:#0b1220;}
  table.lead td.name,table.lead th.name{text-align:left;}
  table.lead td.name{font-weight:600;color:var(--s200);}
  table.lead .role{font-size:11px;color:var(--s500);font-weight:600;margin-left:6px;}
  table.lead tr:not(:last-child) td{border-bottom:1px solid #131c2e;}
  table.lead td.demo{color:#34d399;font-weight:700;}
  table.lead tr.totals td{border-top:1px solid var(--border);font-weight:700;color:#fff;background:#0b1220;}
  .rank{display:inline-flex;width:20px;color:var(--s500);font-weight:700;}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
  .panel h3{margin:0 0 12px;font-size:14px;font-weight:700;color:var(--s200);display:flex;align-items:center;gap:8px;}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;}
  .addrow input,.addrow select{background:var(--bg);border:1px solid var(--border2);color:#fff;font-family:inherit;font-size:15px;padding:9px 12px;border-radius:10px;outline:none;}
  .addrow input.name{flex:1;min-width:150px;}
  .addrow input.pin{width:130px;letter-spacing:2px;}
  .addrow input:focus,.addrow select:focus{border-color:#6366f1;}
  .btn-primary{background:#4f46e5;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn-primary:hover{background:#6366f1;}
  .btn-ghost{background:#1e293b;color:var(--s300);border:none;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
  .btn-ghost:hover{background:#334155;}
  .plist{display:flex;flex-direction:column;gap:8px;}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;flex-wrap:wrap;}
  .prow .pinfo{min-width:140px;flex:1;}
  .prow .pn{font-weight:600;color:var(--s200);}
  .prow .pr{font-size:12px;color:var(--s500);margin-left:8px;}
  .prow .pnopin{font-size:11px;color:#fbbf24;margin-left:8px;}
  .goalmini{display:flex;align-items:center;gap:6px;}
  .goalmini label{font-size:11px;color:var(--s500);}
  .goalmini input{width:60px;background:var(--card);border:1px solid var(--border2);color:#fff;font-family:inherit;font-size:14px;padding:6px 8px;border-radius:8px;outline:none;text-align:center;}
  .goalmini input:focus{border-color:#6366f1;}
  .prowbtns{display:flex;gap:6px;}
  .iconbtn{background:none;border:1px solid var(--border);color:#94a3b8;cursor:pointer;padding:7px 10px;border-radius:8px;font-size:12px;font-family:inherit;display:inline-flex;align-items:center;gap:5px;}
  .iconbtn:hover{border-color:var(--border2);color:#fff;}
  .iconbtn.warn:hover{border-color:#9f1239;color:#fb7185;}
  label.fld{display:block;}
  label.fld span{font-size:12px;color:var(--s500);}
  label.fld input{margin-top:4px;width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;color:#fff;font-size:15px;font-family:inherit;outline:none;}
  label.fld input:focus{border-color:#6366f1;}
  .empty{text-align:center;color:var(--s500);font-size:14px;padding:30px 10px;}
  .danger{color:#fb7185;}
  .exprow{display:flex;gap:8px;flex-wrap:wrap;}

  @media print{
    .no-print{display:none!important;}
    body{background:#fff;color:#000;}
    .wrap{max-width:none;padding:0;}
    .rangelabel{color:#333;}
    table.lead{border-color:#ccc;}
    table.lead th{background:#eee;color:#333;border-color:#ccc;}
    table.lead td{color:#111;}
    table.lead td.name{color:#000;}
    table.lead td.demo{color:#0a7a52;}
    table.lead tr.totals td{background:#f3f3f3;color:#000;}
  }
</style>
</head>

    if(!act.length)html+='<div class="empty">No one added yet.</div>';
    else{html+='<div class="plist">'+act.map(function(p){
      return '<div class="prow"><div class="pinfo"><span class="pn">'+esc(p.name)+'</span><span class="pr">'+esc(p.role)+'</span>'+(p.pin?'<span class="pr">PIN '+esc(decPin(p.pin))+'</span>':'<span class="pnopin">no PIN</span>')+'</div>'
        +'<div class="goalmini"><label>Dials</label><input type="number" min="0" value="'+(p.goal_dials||80)+'" data-action="goal" data-id="'+p.id+'" data-field="goal_dials"><label>Demos</label><input type="number" min="0" value="'+(p.goal_demos||3)+'" data-action="goal" data-id="'+p.id+'" data-field="goal_demos"></div>'
        +'<div class="prowbtns"><button class="iconbtn" data-action="reset-pin" data-id="'+p.id+'" title="Set a new PIN for this rep">'+svg(IC.key,14)+' Reset PIN</button><button class="iconbtn warn" data-action="archive" data-id="'+p.id+'">'+svg(IC.archive,14)+' Archive</button></div></div>';}).join('')+'</div>';}
    html+='</div>';
    var arch=archivedPeople();
    if(arch.length){html+='<div class="panel"><h3>'+svg(IC.archive,16)+' Archived ('+arch.length+')</h3><div class="plist">'+arch.map(function(p){
      return '<div class="prow"><div class="pinfo"><span class="pn" style="color:var(--s400)">'+esc(p.name)+'</span><span class="pr">'+esc(p.role)+'</span></div><div class="prowbtns"><button class="iconbtn" data-action="restore" data-id="'+p.id+'">'+svg(IC.restore,14)+' Restore</button></div></div>';}).join('')+'</div><p style="font-size:12px;color:var(--s500);margin:10px 2px 0">Archived reps keep all their history and are hidden from the dropdown &amp; leaderboard.</p></div>';}
    html+='<div class="panel"><h3>'+svg(IC.download,16)+' Export</h3><div class="exprow"><button class="btn-ghost" data-action="export-full">'+svg(IC.download,15)+' Full history (CSV)</button></div><p style="font-size:12px;color:var(--s500);margin:10px 2px 0">One row per rep per day \u2014 opens in Excel or Google Sheets.</p></div>';
    if(!LIVE)html+='<div class="panel"><h3 class="danger">Preview data</h3><p style="font-size:13px;color:var(--s400);margin:0 0 12px">Sample reps &amp; numbers are loaded so you can explore. Clear them before going live.</p><button class="btn-ghost" data-action="clear-all">Clear all preview data</button></div>';
    return html;
  }

  function renderAdminLock(){
    var err=pwError?'<div style="color:#fb7185;font-size:13px;margin-top:10px">Incorrect password.</div>':'';
    return '<div class="panel" style="max-width:420px;margin:28px auto;text-align:center">'
      +'<div style="width:48px;height:48px;border-radius:14px;background:#1e1b4b;color:#818cf8;display:flex;align-items:center;justify-content:center;margin:4px auto 14px">'+svg(IC.lock,22)+'</div>'
      +'<h3 style="justify-content:center">Admin access</h3>'
      +'<p style="font-size:13px;color:var(--s400);margin:0 0 16px">Enter the admin password to manage reps and goals.</p>'
      +'<input id="adminPw" type="password" placeholder="Password" autocomplete="off" style="width:100%;background:var(--bg);border:1px solid var(--border2);color:#fff;font-family:inherit;font-size:15px;padding:10px 12px;border-radius:10px;outline:none" />'
      +err+'<button class="btn-primary" data-action="admin-unlock" style="width:100%;margin-top:14px">Unlock</button></div>';
  }

  function render(){
    var html='<div class="topbar no-print"><div class="brand">'+svg(IC.phone,20)+' Cold Call Tracker <span class="badge">TEAM</span></div><div class="mode-pill"><span class="mode-dot'+(LIVE?' live':'')+'"></span>'+(LIVE?'Synced':'Local preview')+'</div></div>';
    html+=tabsHtml();
    if(!LIVE)html+='<div class="banner no-print"><span style="color:#818cf8">'+svg(IC.settings,18)+'</span><div>You\u2019re in <b>local preview</b> \u2014 the full experience works, but numbers stay on this device only. Connect your database to sync everyone (see chat for setup).</div></div>';
    if(state.tab==='track')html+=renderTrack();
    else if(state.tab==='team')html+=renderTeam();
    else html+=(adminUnlocked?renderAdmin():renderAdminLock());
    document.getElementById('root').innerHTML=html;
  }

  /* ---------------- export ---------------- */
  function downloadCSV(filename,rows){
    var csv=rows.map(function(r){return r.map(function(c){var sv=String(c==null?'':c);return /[",\n]/.test(sv)?'"'+sv.replace(/"/g,'""')+'"':sv;}).join(',');}).join('\n');
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},150);
  }
  var OUT_HEADERS=FIRST_OUTCOMES.map(function(m){return '1st: '+m.label;})
    .concat(DIAL_OUTCOMES.map(function(m){return '2nd+: '+m.label;}))
    .concat(POC_OUTCOMES.map(function(m){return m.label;}));
  function exportTeam(){
    var head=['Rep','Role'].concat(OUT_HEADERS).concat(['Dials','First Outreach','2nd + Outreach','POC','Demos','Connect %','Demo Conv %']);
    var rows=[head];
    activePeople().forEach(function(p){var a=aggFor(p.id);var dials=dialsOf(a),poc=pocOf(a);
      var line=[p.name,p.role];ALL_OUTCOMES.forEach(function(m){line.push(a[m.key]||0);});
      line.push(dials,firstOf(a),poc2Of(a)+pocOf(a),poc,a.demo||0,pct(poc,dials)===null?'':pct(poc,dials),pct(a.demo,poc)===null?'':pct(a.demo,poc));rows.push(line);});
    downloadCSV('team-'+state.period+'-'+todayKey()+'.csv',rows);
  }
  function exportFull(){
    store.getAllEntries().then(function(all){
      var head=['Date','Rep','Role'].concat(OUT_HEADERS).concat(['Dials','First Outreach','2nd + Outreach','POC','Demos']);
      var rows=[head];
      all.sort(function(a,b){return a.day<b.day?1:-1;});
      all.forEach(function(r){var p=personById(r.person_id);if(!p)return;var c=r.counts||{};
        var line=[r.day,p.name,p.role];ALL_OUTCOMES.forEach(function(m){line.push(c[m.key]||0);});
        line.push(dialsOf(c),firstOf(c),poc2Of(c)+pocOf(c),pocOf(c),c.demo||0);rows.push(line);});
      downloadCSV('cold-call-history-'+todayKey()+'.csv',rows);
    });
  }

  /* ---------------- events ---------------- */
  var root=document.getElementById('root');
  function tryPin(create){
    var inp=document.getElementById('editPin');if(!inp)return;var v=(inp.value||'').trim();var person=personById(state.personId);
    if(create){
      if(!/^\d{4,6}$/.test(v)){pinError=true;render();return;}
      store.setPin(state.personId,encPin(v)).then(function(){editUnlocked[state.personId]=true;saveEdit();pinError=false;refresh();});
    } else {
      if(checkPin(v,person)){editUnlocked[state.personId]=true;saveEdit();pinError=false;render();}
      else{pinError=true;render();}
    }
  }
  root.addEventListener('keydown',function(e){
    if(e.key!=='Enter')return;
    if(e.target.id==='adminPw'){var v=e.target.value;if(checkPw(v)){adminUnlocked=true;pwError=false;try{sessionStorage.setItem('cct:admin','1');}catch(e2){}render();}else{pwError=true;render();}}
    else if(e.target.id==='editPin'){var person=personById(state.personId);tryPin(!(person&&person.pin));}
  });
  root.addEventListener('change',function(e){
    var t=e.target;
    if(t.id==='personSel'){state.personId=t.value;pinError=false;saveUi();render();}
    else if(t.id==='dayPick'){state.day=t.value||todayKey();refresh();}
    else if(t.getAttribute&&t.getAttribute('data-action')==='goal'){
      var id=t.getAttribute('data-id'),field=t.getAttribute('data-field'),val=Math.max(0,parseInt(t.value,10)||0),p=personById(id);if(!p)return;
      p[field]=val;store.setGoals(id,p.goal_dials||80,p.goal_demos||3);
    }
  });
  root.addEventListener('click',function(e){
    var el=e.target.closest('[data-action]');if(!el)return;var a=el.getAttribute('data-action');
    if(a==='tab'){state.tab=el.getAttribute('data-tab');pwError=false;pinError=false;saveUi();render();}
    else if(a==='period'){state.period=el.getAttribute('data-period');saveUi();refresh();}
    else if(a==='inc'){bump(el.getAttribute('data-key'),1);}
    else if(a==='dec'){e.stopPropagation();bump(el.getAttribute('data-key'),-1);}
    else if(a==='edit-unlock'){tryPin(false);}
    else if(a==='edit-setpin'){tryPin(true);}
    else if(a==='edit-lock'){delete editUnlocked[state.personId];saveEdit();render();}
    else if(a==='admin-unlock'){var v=document.getElementById('adminPw').value;if(checkPw(v)){adminUnlocked=true;pwError=false;try{sessionStorage.setItem('cct:admin','1');}catch(e2){}render();}else{pwError=true;render();}}
    else if(a==='admin-lock'){adminUnlocked=false;try{sessionStorage.removeItem('cct:admin');}catch(e2){}render();}
    else if(a==='add-person'){var n=document.getElementById('newName').value.trim();var r=document.getElementById('newRole').value;var pn=document.getElementById('newPin').value.trim();if(!n){alert('Enter a name.');return;}if(!/^\d{4,6}$/.test(pn)){alert('Set a PIN of 4\u20136 digits for this rep.');return;}store.addPerson(n,r,encPin(pn)).then(refresh);}
    else if(a==='archive'){if(window.confirm('Archive this rep? Their history is kept and they can be restored.'))store.archivePerson(el.getAttribute('data-id')).then(refresh);}
    else if(a==='restore'){store.restorePerson(el.getAttribute('data-id')).then(refresh);}
    else if(a==='reset-pin'){var np=window.prompt('Enter a new PIN (4\u20136 digits) for this rep:');if(np==null)return;np=np.trim();if(!/^\d{4,6}$/.test(np)){alert('PIN must be 4\u20136 digits.');return;}store.setPin(el.getAttribute('data-id'),encPin(np)).then(refresh);}
    else if(a==='export-team'){exportTeam();}
    else if(a==='export-full'){exportFull();}
    else if(a==='print'){window.print();}
    else if(a==='clear-all'){if(window.confirm('Clear all preview reps and data from this device?')){['cct:people','cct:entries','cct:ui','cct:seeded'].forEach(function(k){localStorage.removeItem(k);});try{sessionStorage.removeItem('cct:edit');}catch(e2){}editUnlocked={};state.personId=null;refresh();}}
  });

  seedIfNeeded().then(refresh);
})();
</script>
</body>
</html>
